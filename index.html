<script>
    // ⚠️ 這裡已經幫您填好剛才截圖中的網址與 ID
    const API_URL = "https://script.google.com/macros/s/AKfycbxaaJGbJNEB8u-TzOwDQbYKDPFmoDDr2KbC34WZA495MvRlUKqYyGxdjlnQb7or37NVdw/exec"; 
    const MY_LIFF_ID = "2009933180-m1pQd7Xs";

    liff.init({ liffId: MY_LIFF_ID });

    async function submitData() {
        const data = {
            date: new Date().toLocaleDateString('zh-TW'),
            user: document.getElementById("user").value,
            review: document.getElementById("review").value,
            A: document.getElementById("A").value,
            B: document.getElementById("B").value,
            C: document.getElementById("C").value,
            D: document.getElementById("D").value,
            glass: document.getElementById("glass").value,
            angel_done: document.getElementById("angel_done").value,
            manager_assign: document.getElementById("manager_assign").value,
            angel_reply: document.getElementById("angel_reply").value,
            decision: document.getElementById("decision").value
        };

        if(!data.user) { alert("請填寫管理者名字"); return; }

        try {
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(data),
                mode: 'no-cors'
            });
            alert("✅ 送出成功！請至試算表確認。");
            liff.closeWindow();
        } catch (error) {
            alert("❌ 送出失敗，請檢查網址或權限。");
        }
    }
</script>
